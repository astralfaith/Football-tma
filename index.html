<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="manifest" href="manifest.json">

<style>
    :root {
        --tg-theme-bg-color: #ffffff;
        --tg-theme-text-color: #000000;
        --tg-theme-hint-color: #8e8e93;
        --tg-theme-link-color: #007aff;
        --tg-theme-button-color: #007aff;
        --tg-theme-button-text-color: #ffffff;
        --tg-theme-secondary-bg-color: #f2f2f7;
        --tg-theme-header-bg-color: #ffffff;
        --tg-theme-accent-text-color: #007aff;
        --tg-theme-section-bg-color: #ffffff;
        --tg-theme-section-header-text-color: #6d6d6d;
        --tg-theme-subtitle-text-color: #8e8e93;
        --tg-theme-destructive-text-color: #ff3b30;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
        background: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
        overflow-x: hidden;
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* Header */
    .header {
        position: sticky;
        top: 0;
        background: var(--tg-theme-header-bg-color);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 100;
        border-bottom: 0.5px solid rgba(0,0,0,0.1);
        padding: 12px 16px;
    }

    .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .header-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--tg-theme-text-color);
        letter-spacing: -0.5px;
    }

    .header-subtitle {
        font-size: 13px;
        color: var(--tg-theme-subtitle-text-color);
        margin-top: 2px;
        font-weight: 500;
    }

    .live-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #ff3b30;
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(0.98); }
    }

    .live-dot {
        width: 6px;
        height: 6px;
        background: white;
        border-radius: 50%;
        animation: blink 1.5s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }

    .refresh-btn {
        background: var(--tg-theme-secondary-bg-color);
        color: var(--tg-theme-text-color);
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .refresh-btn:active {
        transform: scale(0.9);
        background: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
    }

    .refresh-btn.spinning svg {
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Navigation */
    .nav-tabs {
        display: flex;
        background: var(--tg-theme-secondary-bg-color);
        padding: 4px;
        margin: 12px 16px;
        border-radius: 10px;
        gap: 4px;
    }

    .nav-tab {
        flex: 1;
        padding: 10px 8px;
        border: none;
        background: transparent;
        color: var(--tg-theme-text-color);
        font-size: 13px;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
    }

    .nav-tab.active {
        background: var(--tg-theme-section-bg-color);
        box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        color: var(--tg-theme-text-color);
    }

    /* Competitions */
    .competition-section {
        margin: 0 16px 12px;
    }

    .section-header {
        font-size: 13px;
        font-weight: 600;
        color: var(--tg-theme-section-header-text-color);
        text-transform: uppercase;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
    }

    .competition-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
    }

    .competition-card {
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 12px;
        padding: 12px 6px;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
        text-align: center;
    }

    .competition-card:active {
        transform: scale(0.95);
    }

    .competition-card.active {
        border-color: var(--tg-theme-button-color);
        background: var(--tg-theme-section-bg-color);
    }

    .competition-flag {
        font-size: 28px;
        margin-bottom: 4px;
        line-height: 1;
    }

    .competition-name {
        font-size: 11px;
        font-weight: 600;
        color: var(--tg-theme-text-color);
        line-height: 1.2;
    }

    /* Matches */
    .matches-container {
        margin: 0 16px;
    }

    .date-header {
        font-size: 15px;
        font-weight: 700;
        color: var(--tg-theme-text-color);
        margin: 20px 0 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        text-transform: capitalize;
    }

    .date-header::before {
        content: '';
        display: inline-block;
        width: 4px;
        height: 18px;
        background: var(--tg-theme-button-color);
        border-radius: 2px;
    }

    .match-card {
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }

    .match-card:active {
        transform: scale(0.98);
        background: rgba(0,122,255,0.1);
    }

    .match-card.live {
        background: linear-gradient(135deg, rgba(255,59,48,0.08) 0%, var(--tg-theme-secondary-bg-color) 100%);
        border: 1px solid rgba(255,59,48,0.2);
    }

    .match-live-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: #ff3b30;
        color: white;
        font-size: 10px;
        font-weight: 800;
        padding: 4px 10px;
        border-radius: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        animation: pulse 2s infinite;
    }

    .match-teams {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .team-row {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .team-logo {
        width: 32px;
        height: 32px;
        object-fit: contain;
        border-radius: 50%;
        background: white;
        padding: 3px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        flex-shrink: 0;
    }

    .team-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--tg-theme-text-color);
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .team-score {
        font-size: 18px;
        font-weight: 800;
        color: var(--tg-theme-text-color);
        min-width: 28px;
        text-align: center;
        font-variant-numeric: tabular-nums;
    }

    .match-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        margin-left: 12px;
        min-width: 60px;
    }

    .match-time {
        font-size: 14px;
        color: var(--tg-theme-hint-color);
        font-weight: 600;
    }

    .match-status {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 8px;
    }

    .match-status.live {
        background: #ff3b30;
        color: white;
    }

    .match-status.finished {
        background: var(--tg-theme-hint-color);
        color: white;
        opacity: 0.7;
    }

    .match-status.scheduled {
        background: var(--tg-theme-button-color);
        color: white;
    }

    .minute-badge {
        font-size: 13px;
        color: #ff3b30;
        font-weight: 800;
        margin-top: 2px;
    }

    /* Standings */
    .standings-container {
        margin: 0 16px;
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 16px;
        overflow: hidden;
    }

    .standings-header {
        display: grid;
        grid-template-columns: 36px 1fr 36px 36px 40px 40px;
        padding: 14px 12px;
        background: var(--tg-theme-bg-color);
        font-size: 12px;
        font-weight: 700;
        color: var(--tg-theme-hint-color);
        text-align: center;
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .standings-row {
        display: grid;
        grid-template-columns: 36px 1fr 36px 36px 40px 40px;
        padding: 12px;
        align-items: center;
        border-bottom: 1px solid rgba(0,0,0,0.03);
        font-size: 14px;
        transition: background 0.2s;
    }

    .standings-row:active {
        background: rgba(0,0,0,0.05);
    }

    .standings-row:last-child {
        border-bottom: none;
    }

    .position {
        font-weight: 800;
        text-align: center;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 12px;
        margin: 0 auto;
    }

    .position.champion {
        background: linear-gradient(135deg, #FFD700, #FFA500);
        color: #000;
    }

    .position.cl {
        background: #007aff;
        color: white;
    }

    .position.el {
        background: #ff9500;
        color: white;
    }

    .position.conference {
        background: #32c759;
        color: white;
    }

    .position.relegation {
        background: #ff3b30;
        color: white;
    }

    .team-cell {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        overflow: hidden;
        padding-left: 4px;
    }

    .team-cell img {
        width: 24px;
        height: 24px;
        object-fit: contain;
        flex-shrink: 0;
    }

    .team-cell span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 14px;
    }

    .stats-cell {
        text-align: center;
        font-size: 13px;
        color: var(--tg-theme-text-color);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
    }

    /* Scorers */
    .scorers-container {
        margin: 0 16px;
    }

    .scorer-card {
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 14px;
        transition: all 0.2s;
    }

    .scorer-card:active {
        transform: scale(0.98);
        background: rgba(0,122,255,0.1);
    }

    .scorer-rank {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--tg-theme-button-color), #0051d5);
        color: var(--tg-theme-button-text-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 15px;
        flex-shrink: 0;
    }

    .scorer-info {
        flex: 1;
        min-width: 0;
    }

    .scorer-name {
        font-size: 16px;
        font-weight: 700;
        color: var(--tg-theme-text-color);
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .scorer-team {
        font-size: 13px;
        color: var(--tg-theme-hint-color);
        font-weight: 500;
    }

    .scorer-stats {
        text-align: right;
    }

    .scorer-goals {
        font-size: 20px;
        font-weight: 800;
        color: var(--tg-theme-accent-text-color);
        font-variant-numeric: tabular-nums;
    }

    .scorer-assists {
        font-size: 12px;
        color: var(--tg-theme-hint-color);
        margin-top: 2px;
        font-weight: 500;
    }

    /* Loading & States */
    .skeleton {
        background: linear-gradient(90deg, var(--tg-theme-secondary-bg-color) 25%, var(--tg-theme-bg-color) 50%, var(--tg-theme-secondary-bg-color) 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
        border-radius: 8px;
    }

    @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    .skeleton-card {
        height: 100px;
        margin-bottom: 10px;
        border-radius: 16px;
    }

    .error-container {
        text-align: center;
        padding: 60px 20px;
        color: var(--tg-theme-hint-color);
    }

    .error-icon {
        font-size: 64px;
        margin-bottom: 20px;
    }

    .error-text {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 24px;
        color: var(--tg-theme-text-color);
    }

    .retry-btn {
        background: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        padding: 14px 28px;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .retry-btn:active {
        transform: scale(0.95);
    }

    .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: var(--tg-theme-hint-color);
    }

    .empty-icon {
        font-size: 72px;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .empty-text {
        font-size: 17px;
        font-weight: 600;
    }

    .legend {
        margin: 16px;
        padding: 16px;
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 12px;
        font-size: 12px;
        color: var(--tg-theme-text-color);
    }

    .legend-title {
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--tg-theme-text-color);
    }

    .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
    }

    .legend-color {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
    }

    .last-update {
        font-size: 12px;
        color: var(--tg-theme-hint-color);
        text-align: center;
        margin-top: 10px;
        margin-bottom: 20px;
        font-weight: 500;
    }

    /* Pull to refresh */
    .ptr-indicator {
        text-align: center;
        padding: 20px;
        color: var(--tg-theme-hint-color);
        font-size: 14px;
        display: none;
        font-weight: 500;
    }

    .ptr-indicator.visible {
        display: block;
    }

    /* Match Detail Modal */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        display: none;
        align-items: flex-end;
        justify-content: center;
        backdrop-filter: blur(5px);
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal-content {
        background: var(--tg-theme-bg-color);
        width: 100%;
        max-height: 80vh;
        border-radius: 20px 20px 0 0;
        padding: 20px;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        overflow-y: auto;
    }

    .modal-overlay.active .modal-content {
        transform: translateY(0);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--tg-theme-secondary-bg-color);
    }

    .modal-title {
        font-size: 18px;
        font-weight: 700;
    }

    .modal-close {
        background: var(--tg-theme-secondary-bg-color);
        border: none;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
    }

    .match-detail-score {
        text-align: center;
        font-size: 48px;
        font-weight: 800;
        margin: 20px 0;
        font-variant-numeric: tabular-nums;
    }

    .match-detail-teams {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin-bottom: 30px;
    }

    .detail-team {
        text-align: center;
        flex: 1;
    }

    .detail-team img {
        width: 60px;
        height: 60px;
        margin-bottom: 10px;
    }

    .detail-team-name {
        font-size: 14px;
        font-weight: 600;
    }

    .detail-info {
        background: var(--tg-theme-secondary-bg-color);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
    }

    .detail-info-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .detail-info-row:last-child {
        border-bottom: none;
    }

    .detail-label {
        color: var(--tg-theme-hint-color);
        font-size: 14px;
    }

    .detail-value {
        font-weight: 600;
        font-size: 14px;
    }
</style>
