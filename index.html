<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football DB</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .ok { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Football Database</h1>
    <div id="result">Caricamento...</div>
    
    <script>
        const API_KEY = 'e87c9bf2a8d74557b85159bb408a57c5';
        
        fetch('https://api.football-data.org/v4/competitions/SA/matches?limit=3', {
            headers: { 'X-Auth-Token': API_KEY }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var count = data.matches ? data.matches.length : 0;
            document.getElementById('result').innerHTML = 
                '<p class="ok">OK! Trovate ' + count + ' partite Serie A</p>';
        })
        .catch(function(e) {
            document.getElementById('result').innerHTML = 
                '<p class="error">Errore: ' + e.message + '</p>';
        });
    </script>
</body>
</html>
